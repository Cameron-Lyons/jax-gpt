name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff>=0.14.14
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,pretrained]"
      - run: mypy jax_gpt/model.py jax_gpt/gpt2.py jax_gpt/parameter_converter.py jax_gpt/train.py jax_gpt/benchmark.py jax_gpt/sample.py jax_gpt/utils.py jax_gpt/config.py jax_gpt/sharding.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,pretrained]"
      - run: pytest tests/ -v -m "not network and not gpu and not slow"
